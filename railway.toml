[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "ln -sf /opt/data/AGENTS.md /opt/hermes/AGENTS.md && ln -sf /opt/data/SOUL.md /opt/hermes/SOUL.md && /opt/hermes/.venv/bin/hermes gateway run"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckTimeout = 300